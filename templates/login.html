<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    
    <style>
        *{
            margin: 0;
            overflow: hidden;
        }
        body{
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container_login{
            background-color: lightgray;
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            border-radius: 8px;
            box-shadow: 0 0 10px rgb(0 0 0 / 0.25);
        }
        h1{
            text-align: center;
            margin-bottom: 5px;
        }
        button{
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <form action="/admin" class="container_login", method="post">
        <h1>Login</h1>
        <p>Usuário</p>
        <input type="text" id="usuario" name="usuario">
        <p>Senha</p>
        <input type="password" id="senha" name="senha">
        <button type="submit">ENTRAR</button>
        <button type="submit">Não tem uma senha? Cadastre-se</button>
    </form>
</body>
</html>
